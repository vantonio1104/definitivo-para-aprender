# ================================================================
#  mongod.cfg — Configuración de MongoDB para ComercioTech
#  MongoDB 8.2.6 Community Edition
#
#  INSTRUCCIONES:
#  1. Copiar este archivo a:
#     C:\Program Files\MongoDB\Server\<version>\bin\mongod.cfg
#  2. Crear los directorios: C:\data\db  y  C:\data\log
#  3. Reiniciar el servicio: Restart-Service -Name "MongoDB"
# ================================================================

# ─── Almacenamiento de datos ────────────────────────────────────
storage:
  dbPath: C:\data\db
  journal:
    enabled: true

  # Motor WiredTiger
  # Fórmula recomendada para ajustar la caché a tu equipo:
  #   cacheSizeGB = (RAM_total_GB - 1) × 0.50
  # Ejemplos: 8 GB RAM → 3.5 | 16 GB RAM → 7.5 | 32 GB RAM → 15.5
  # Si no se especifica, MongoDB usa el 50% de (RAM - 1 GB) automáticamente.
  wiredTiger:
    engineConfig:
      # cacheSizeGB: 4   ← descomentar y ajustar según la RAM disponible
      journalCompressor: snappy
    collectionConfig:
      blockCompressor: snappy
    indexConfig:
      prefixCompression: true

# ─── Logs del servidor ──────────────────────────────────────────
systemLog:
  destination: file
  path: C:\data\log\mongod.log
  logAppend: true
  logRotate: reopen
  # verbosity: 0 = solo INFO
  # verbosity: 1 = DEBUG (activar solo para diagnóstico)
  verbosity: 0

# ─── Configuración de red ───────────────────────────────────────
net:
  port: 27017
  # SEGURIDAD CRÍTICA: solo aceptar conexiones desde localhost
  # Cambiar a la IP del servidor si se necesita acceso en red local
  bindIp: 127.0.0.1
  maxIncomingConnections: 100

# ─── Seguridad ──────────────────────────────────────────────────
# PASO 1: Mantener comentado para crear el usuario superadmin
# PASO 2: Descomentar DESPUÉS de ejecutar crear_usuarios_mongodb.js
security:
  authorization: enabled

# ─── Gestión del proceso (Servicio Windows) ─────────────────────
processManagement:
  windowsService:
    serviceName: MongoDB
    displayName: "MongoDB Database Service - ComercioTech"
    description: "Motor de base de datos NoSQL para el sistema ComercioTech"
